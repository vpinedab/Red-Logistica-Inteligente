services:
  smart-logistics:
    build: .
    container_name: smart-logistics-container
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "
      python3 src/simulation/demand_generator.py &&
      python3 src/simulation/logistics_network.py &&
      python3 src/simulation/simulation_engine.py &&
      python3 -m app.main
      "